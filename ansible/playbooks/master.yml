---
- name: Bootstrap K3s master
  hosts: master
  become: true
  tasks:
    - name: Install K3s server                                                                                              
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
          --disable traefik \
          --node-label role=master
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 60

    - name: Read node token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: node_token

    - name: Fetch kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ~/.kube/k3s-config
        flat: true

    - name: Create ArgoCD namespace
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      command: kubectl create namespace argocd
      register: argocd_ns
      failed_when: argocd_ns.rc != 0 and 'already exists' not in argocd_ns.stderr
      changed_when: argocd_ns.rc == 0

    - name: Check if ArgoCD is already installed
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      command: kubectl get deployment argocd-server -n argocd
      register: argocd_check
      failed_when: false
      changed_when: false

    - name: Copy ArgoCD manifest to master node
      copy:
        src: ../../argocd/manifests/install.yaml
        dest: /tmp/argocd-install.yaml

    - name: Install ArgoCD
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      shell: |
        kubectl apply -n argocd --server-side --force-conflicts \
          -f /tmp/argocd-install.yaml
      when: argocd_check.rc != 0

    - name: Wait for ArgoCD to be ready
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      command: >
        kubectl wait --for=condition=available --timeout=300s
        deployment/argocd-server -n argocd